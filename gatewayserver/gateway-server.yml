server:
  port: 8072

eureka:
  instance:
    preferIpAddress: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8070/eureka/



#Automatic mapping of routes via service discovery
 #spring:
   #cloud:
     #gateway:
       #discovery:
         #locator:
           #enabled: true
           #lowerCaseServiceId: true

#MANUALLY MAPPING ROUTES USING SERVICE DISCOVERY

spring:
  cloud:
    gateway:
      

        routes:
          - id: organization-service   # 1. NAME OF THIS ROUTE
            uri: lb://ORGANIZATION-SERVICE    # 2. WHERE TO SEND IT

            predicates:
            - Path=/organization/**   # 3. WHEN TO USE THIS ROUTE

            filters:
            - RemoveRequestHeader=Cookie
            - RemoveRequestHeader=Set-Cookie
            - RewritePath=/organization/?(?<path>.*), /$\{path}
          - id: licensing-service
            uri: lb://licensing-service
            predicates:
            - Path=/license/**
            filters:
            - RewritePath=/license/?(?<path>.*), /$\{path}
            - RemoveRequestHeader=Cookie
            - RemoveRequestHeader=Set-Cookie




